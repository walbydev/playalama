# docker-compose.staging.yml
# Environnement STAGING — staging.playalama.online
#
# Déploiement image-only (aucun build sur le VPS) :
#   make deploy-staging SSH_KEY=~/.ssh/playalama.key
#
# Prérequis VPS :
#   - Réseau Docker "traefik-net" existant (créé par make deploy-traefik)
#   - Fichier .env présent dans /opt/playalama/staging/
#   - Images chargées via deploy-env.sh (docker load)
#
# Routing Traefik :
#   staging.playalama.online/health    → lama-server-staging    (priorité 25)
#   staging.playalama.online/api/      → lama-server-staging    (priorité 20)
#   staging.playalama.online/downloads → lama-downloads-staging (priorité 20)
#   staging.playalama.online/          → lama-webapp-staging    (catch-all, priorité 10)

services:

  # ─────────────────────────────────────────────────────────
  # API Jeu + SignalR/SSE
  # ─────────────────────────────────────────────────────────
  lama-server-staging:
    image: lama-server:${DEPLOY_TAG:-latest}
    container_name: lama-server-staging
    networks:
      - staging-internal
      - traefik-net
    env_file: .env
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_ENVIRONMENT: "Staging"
      LAMA_SERVER_ALLOW_SHUTDOWN: "true"
      LAMA_RUNTIME_MODE: "online"
    expose:
      - "5000"
    volumes:
      - ./assets/languages:/app/assets/languages:ro
      - lama-logs-staging:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # /health
      - "traefik.http.routers.server-staging-health.rule=Host(`staging.playalama.online`) && Path(`/health`)"
      - "traefik.http.routers.server-staging-health.entrypoints=websecure"
      - "traefik.http.routers.server-staging-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-staging-health.service=server-staging-svc"
      - "traefik.http.routers.server-staging-health.priority=25"
      # /api/
      - "traefik.http.routers.server-staging-api.rule=Host(`staging.playalama.online`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.server-staging-api.entrypoints=websecure"
      - "traefik.http.routers.server-staging-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-staging-api.service=server-staging-svc"
      - "traefik.http.routers.server-staging-api.priority=20"
      - "traefik.http.services.server-staging-svc.loadbalancer.server.port=5000"

  # ─────────────────────────────────────────────────────────
  # WebApp unifiée (portail + jeu) — catch-all /
  # ─────────────────────────────────────────────────────────
  lama-webapp-staging:
    image: lama-webapp:${DEPLOY_TAG:-latest}
    container_name: lama-webapp-staging
    networks:
      - staging-internal
      - traefik-net
    env_file: .env
    environment:
      ASPNETCORE_URLS: "http://+:5001"
      ASPNETCORE_ENVIRONMENT: "Staging"
      LamaApi__BaseUrl: "http://lama-server-staging:5000"
      LAMA_SERVER_URL: "http://lama-server-staging:5000"
    expose:
      - "5001"
    restart: unless-stopped
    depends_on:
      lama-server-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.webapp-staging.rule=Host(`staging.playalama.online`)"
      - "traefik.http.routers.webapp-staging.entrypoints=websecure"
      - "traefik.http.routers.webapp-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webapp-staging.service=webapp-staging-svc"
      - "traefik.http.routers.webapp-staging.priority=10"
      - "traefik.http.services.webapp-staging-svc.loadbalancer.server.port=5001"

  # ─────────────────────────────────────────────────────────
  # Fichiers statiques de téléchargement (/downloads/)
  # ─────────────────────────────────────────────────────────
  lama-downloads-staging:
    image: nginx:alpine
    container_name: lama-downloads-staging
    networks:
      - traefik-net
    volumes:
      - ./artifacts/zip:/usr/share/nginx/html/downloads:ro
      - ./tools/docker/nginx-downloads.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.downloads-staging.rule=Host(`staging.playalama.online`) && PathPrefix(`/downloads/`)"
      - "traefik.http.routers.downloads-staging.entrypoints=websecure"
      - "traefik.http.routers.downloads-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.downloads-staging.service=downloads-staging-svc"
      - "traefik.http.routers.downloads-staging.priority=20"
      - "traefik.http.services.downloads-staging-svc.loadbalancer.server.port=80"

networks:
  staging-internal:
    driver: bridge
    internal: true
  traefik-net:
    external: true

volumes:
  lama-logs-staging:

