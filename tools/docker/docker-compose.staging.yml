# docker-compose.staging.yml
# Environnement STAGING — staging.playalama.online
#
# Usage depuis le VPS (/srv/playalama/staging/) :
#   docker compose -f tools/docker/docker-compose.staging.yml up -d --build
#
# Usage depuis le PC de dev :
#   make deploy-staging SSH_KEY=~/.ssh/playalama.key
#
# Prérequis VPS :
#   - Réseau Docker "traefik-net" existant (créé par make deploy-traefik)
#   - Fichier .env présent dans /srv/playalama/staging/ (voir tools/environments/.env.staging.example)
#
# Routing Traefik :
#   staging.playalama.online/            → lama-portal-webapp-staging  (priorité 10)
#   staging.playalama.online/live/       → lama-game-webapp-staging    (priorité 20, strip /live)
#   staging.playalama.online/api/        → lama-server-staging         (priorité 20)
#   staging.playalama.online/health      → lama-server-staging         (priorité 25)
#   staging.playalama.online/downloads/  → lama-downloads-staging      (priorité 20)

services:

  # ─────────────────────────────────────────────────────────
  # API Jeu + SignalR/SSE
  # ─────────────────────────────────────────────────────────
  lama-server-staging:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.server
    container_name: lama-server-staging
    networks:
      - staging-internal
      - traefik-net
    env_file: ../../.env
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_ENVIRONMENT: "Staging"
      LAMA_SERVER_ALLOW_SHUTDOWN: "true"
      LAMA_RUNTIME_MODE: "online"
    expose:
      - "5000"
    volumes:
      - ../../assets/languages:/app/assets/languages:ro
      - ../../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # /health
      - "traefik.http.routers.server-staging-health.rule=Host(`staging.playalama.online`) && Path(`/health`)"
      - "traefik.http.routers.server-staging-health.entrypoints=websecure"
      - "traefik.http.routers.server-staging-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-staging-health.service=server-staging-svc"
      - "traefik.http.routers.server-staging-health.priority=25"
      # /api/
      - "traefik.http.routers.server-staging-api.rule=Host(`staging.playalama.online`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.server-staging-api.entrypoints=websecure"
      - "traefik.http.routers.server-staging-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-staging-api.service=server-staging-svc"
      - "traefik.http.routers.server-staging-api.priority=20"
      # Service definition
      - "traefik.http.services.server-staging-svc.loadbalancer.server.port=5000"

  # ─────────────────────────────────────────────────────────
  # App de jeu en ligne (/live/)
  # ─────────────────────────────────────────────────────────
  lama-game-webapp-staging:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.webapp
    container_name: lama-game-webapp-staging
    networks:
      - staging-internal
      - traefik-net
    env_file: ../../.env
    environment:
      ASPNETCORE_URLS: "http://+:5050"
      ASPNETCORE_ENVIRONMENT: "Staging"
      LamaApi__BaseUrl: "http://lama-server-staging:5000"
      LAMA_SERVER_URL: "http://lama-server-staging:5000"
    expose:
      - "5050"
    restart: unless-stopped
    depends_on:
      lama-server-staging:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # /live/
      - "traefik.http.routers.game-webapp-staging.rule=Host(`staging.playalama.online`) && PathPrefix(`/live/`)"
      - "traefik.http.routers.game-webapp-staging.entrypoints=websecure"
      - "traefik.http.routers.game-webapp-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.game-webapp-staging.service=game-webapp-staging-svc"
      - "traefik.http.routers.game-webapp-staging.middlewares=strip-live-staging"
      - "traefik.http.routers.game-webapp-staging.priority=20"
      # redirect /live → /live/
      - "traefik.http.routers.game-webapp-staging-redirect.rule=Host(`staging.playalama.online`) && Path(`/live`)"
      - "traefik.http.routers.game-webapp-staging-redirect.entrypoints=websecure"
      - "traefik.http.routers.game-webapp-staging-redirect.tls.certresolver=letsencrypt"
      - "traefik.http.routers.game-webapp-staging-redirect.middlewares=redirect-live-staging"
      - "traefik.http.routers.game-webapp-staging-redirect.priority=21"
      - "traefik.http.routers.game-webapp-staging-redirect.service=game-webapp-staging-svc"
      # Middlewares
      - "traefik.http.middlewares.strip-live-staging.stripprefix.prefixes=/live"
      - "traefik.http.middlewares.redirect-live-staging.redirectregex.regex=^(https://staging.playalama.online)/live$$"
      - "traefik.http.middlewares.redirect-live-staging.redirectregex.replacement=$${1}/live/"
      - "traefik.http.middlewares.redirect-live-staging.redirectregex.permanent=false"
      # Service definition
      - "traefik.http.services.game-webapp-staging-svc.loadbalancer.server.port=5050"

  # ─────────────────────────────────────────────────────────
  # Portail public (racine /)
  # ─────────────────────────────────────────────────────────
  lama-portal-webapp-staging:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.portalwebapp
    container_name: lama-portal-webapp-staging
    networks:
      - staging-internal
      - traefik-net
    env_file: ../../.env
    environment:
      ASPNETCORE_URLS: "http://+:5060"
      ASPNETCORE_ENVIRONMENT: "Staging"
    expose:
      - "5060"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5060/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # Catch-all staging
      - "traefik.http.routers.portal-staging.rule=Host(`staging.playalama.online`)"
      - "traefik.http.routers.portal-staging.entrypoints=websecure"
      - "traefik.http.routers.portal-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.portal-staging.service=portal-staging-svc"
      - "traefik.http.routers.portal-staging.priority=10"
      # Service definition
      - "traefik.http.services.portal-staging-svc.loadbalancer.server.port=5060"

  # ─────────────────────────────────────────────────────────
  # Fichiers statiques de téléchargement (/downloads/)
  # ─────────────────────────────────────────────────────────
  lama-downloads-staging:
    image: nginx:alpine
    container_name: lama-downloads-staging
    networks:
      - traefik-net
    volumes:
      - ../../artifacts/zip:/usr/share/nginx/html/downloads:ro
      - ../../tools/docker/nginx-downloads.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.downloads-staging.rule=Host(`staging.playalama.online`) && PathPrefix(`/downloads/`)"
      - "traefik.http.routers.downloads-staging.entrypoints=websecure"
      - "traefik.http.routers.downloads-staging.tls.certresolver=letsencrypt"
      - "traefik.http.routers.downloads-staging.service=downloads-staging-svc"
      - "traefik.http.routers.downloads-staging.priority=20"
      - "traefik.http.services.downloads-staging-svc.loadbalancer.server.port=80"

networks:
  staging-internal:
    driver: bridge
    internal: true
  traefik-net:
    external: true
