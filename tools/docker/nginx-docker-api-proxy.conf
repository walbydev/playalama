# Proxy de réécriture de la version d'API Docker
# Problème : Traefik v3 envoie des requêtes avec API v1.24 (hardcodé pour compat legacy)
#            Docker 29+ exige une version minimale de 1.40 → rejet systématique
# Solution  : nginx intercepte les requêtes /v1.XX/ et les réécrit en /v1.47/

upstream docker_socket {
    server unix:/var/run/docker.sock;
}

server {
    listen 2375;

    # Réécriture de toute version d'API → 1.47 (supportée par Docker 29, API max 1.54)
    location ~ ^/v[0-9.]+ {
        rewrite ^/v[0-9.]+/(.*)$ /v1.47/$1 break;
        proxy_pass         http://docker_socket;
        proxy_http_version 1.1;
        proxy_set_header   Host "";
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_read_timeout 600s;
    }

    # Requêtes non versionnées (/_ping, /version, etc.)
    location / {
        proxy_pass         http://docker_socket;
        proxy_http_version 1.1;
        proxy_set_header   Host "";
        proxy_set_header   Connection "";
        proxy_buffering    off;
        proxy_read_timeout 600s;
    }
}
