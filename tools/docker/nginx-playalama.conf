# Configuration nginx pour playalama.online
# Ce fichier doit être utilisé pour configurer le proxy inverse

upstream lama_server {
    server lama-server:5000;
}

upstream lama_game_webapp {
    server lama-game-webapp:5050;
}

upstream lama_portal_webapp {
    server lama-portal-webapp:5060;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Redirection HTTP vers HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name playalama.online www.playalama.online live.playalama.online downloads.playalama.online;

    location /.well-known/acme-challenge {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Serveur HTTPS principal (site + API)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name playalama.online www.playalama.online;

    # Configuration SSL - À adapter selon votre environnement
    # Pour Let's Encrypt :
    ssl_certificate /etc/letsencrypt/live/playalama.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playalama.online/privkey.pem;

    # Paramètres SSL recommandés
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # HSTS (HTTP Strict Transport Security)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Autres headers de sécurité
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location /downloads/ {
        alias /opt/playalama-downloads/;
        try_files $uri =404;
        autoindex off;
        add_header Cache-Control "public, max-age=3600" always;
        types {
            application/zip zip;
        }
        default_type application/octet-stream;
    }

    location /health {
        proxy_pass http://lama_server;
        proxy_http_version 1.1;

        # Headers essentiels pour le proxy inverse
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;

        # Buffering
        proxy_buffering off;
    }

    # Server-Sent Events (SSE) - Pour les événements en temps réel
    location ~ ^/api/games/.+/events$ {
        proxy_pass http://lama_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE ne doit pas être buffered
        proxy_buffering off;
        proxy_cache off;
        
        # Éviter les timeouts pour les connexions SSE longues
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        proxy_pass http://lama_server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Le portail public est servi par Lama.PortalWebApp.
    location / {
        proxy_pass http://lama_portal_webapp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    # Logs
    access_log /var/log/nginx/playalama-access.log combined;
    error_log /var/log/nginx/playalama-error.log;
}

# Serveur HTTPS dedie au jeu live
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name live.playalama.online;

    ssl_certificate /etc/letsencrypt/live/playalama.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playalama.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location / {
        proxy_pass http://lama_game_webapp;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        proxy_buffering off;
    }

    access_log /var/log/nginx/playalama-live-access.log combined;
    error_log /var/log/nginx/playalama-live-error.log;
}

# Serveur HTTPS dédié aux téléchargements directs
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name downloads.playalama.online;

    ssl_certificate /etc/letsencrypt/live/playalama.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/playalama.online/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    location = / {
        return 302 https://playalama.online/download/;
    }

    location / {
        alias /opt/playalama-downloads/;
        try_files $uri =404;
        autoindex off;
        add_header Cache-Control "public, max-age=3600" always;
        types {
            application/zip zip;
        }
        default_type application/octet-stream;
    }

    access_log /var/log/nginx/playalama-downloads-access.log combined;
    error_log /var/log/nginx/playalama-downloads-error.log;
}

