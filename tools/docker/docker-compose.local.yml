# docker-compose.local.yml
# Environnement développement LOCAL avec hot-reload et debug
# Usage: docker compose -f tools/docker/docker-compose.local.yml up
# Ref: DOCKER_ARCHITECTURE.md

version: '3.8'

services:
  postgres-lama:
    image: postgres:16-alpine
    container_name: postgres-lama-local-dev
    networks:
      - lama-network
    environment:
      POSTGRES_DB: lama_dev
      POSTGRES_USER: lama_dev
      POSTGRES_PASSWORD: dev_password_change_me
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - lama-postgres-local-data:/var/lib/postgresql/data
      - ../../tools/postgres/01-init-sessions-schema.sql:/docker-entrypoint-initdb.d/01-init-sessions-schema.sql:ro
      - ../../tools/postgres/02-init-history-schema.sql:/docker-entrypoint-initdb.d/02-init-history-schema.sql:ro
      - ../../tools/postgres/03-init-rating-schema.sql:/docker-entrypoint-initdb.d/03-init-rating-schema.sql:ro
      - ../../tools/postgres/04-baseline-ef-history.sql:/docker-entrypoint-initdb.d/04-baseline-ef-history.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lama_dev -d lama_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  lama-game-webapp:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.webapp
    container_name: lama-game-webapp-dev
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5050"
      ASPNETCORE_ENVIRONMENT: "Development"
      LamaApi__BaseUrl: "http://lama-server:5000"
      LAMA_SERVER_URL: "http://lama-server:5000"
    ports:
      - "5050:5050"
    depends_on:
      lama-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  lama-server:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.server
    container_name: lama-server-dev
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_ENVIRONMENT: "Development"
      LAMA_SERVER_ALLOW_SHUTDOWN: "true"
      ConnectionStrings__LamaServerDb: "Host=postgres-lama;Port=5432;Database=lama_dev;Username=lama_dev;Password=dev_password_change_me;Ssl Mode=Disable;Application Name=LamaServer.Dev;"
      Database__AutoMigrate: "true"
    ports:
      - "5000:5000"
    volumes:
      - ../../assets/languages:/app/assets/languages:ro
      - ../../logs:/app/logs
    depends_on:
      postgres-lama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  lama-network:
    driver: bridge

volumes:
  lama-postgres-local-data:
    driver: local

