# docker-compose.local.yml
# Environnement développement LOCAL avec hot-reload et debug
# Usage: docker compose -f tools/docker/docker-compose.local.yml up
# Ref: DOCKER_ARCHITECTURE.md

version: '3.8'

services:
  lama-game-webapp:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.webapp
    container_name: lama-game-webapp-dev
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5050"
      ASPNETCORE_ENVIRONMENT: "Development"
      LamaApi__BaseUrl: "http://lama-server:5000"
      LAMA_SERVER_URL: "http://lama-server:5000"
    ports:
      - "5050:5050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  lama-portal-webapp:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.portalwebapp
    container_name: lama-portal-webapp-dev
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5060"
      ASPNETCORE_ENVIRONMENT: "Development"
    ports:
      - "5060:5060"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5060/"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  lama-server:
    build:
      context: ../..
      dockerfile: tools/docker/Dockerfile.server
    container_name: lama-server-dev
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_ENVIRONMENT: "Development"
      LAMA_SERVER_ALLOW_SHUTDOWN: "true"
    ports:
      - "5000:5000"
    volumes:
      - ../../assets/languages:/app/assets/languages:ro
      - ../../logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:latest
    container_name: nginx-dev
    networks:
      - lama-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-playalama.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../../artifacts/zip:/opt/playalama-downloads:ro
      - ../../../.deploy/certbot-webroot:/var/www/certbot:ro
      # Pour dev local: certificats autosignés
      - ../../../.deploy/certs:/etc/letsencrypt:ro
    depends_on:
      - lama-game-webapp
      - lama-portal-webapp
      - lama-server
    restart: unless-stopped

networks:
  lama-network:
    driver: bridge

