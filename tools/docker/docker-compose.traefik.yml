# docker-compose.traefik.yml
# Stack Traefik — reverse proxy central pour PROD + STAGING
#
# Déploiement VPS (une seule fois) :
#   make deploy-traefik SSH_KEY=~/.ssh/playalama.key
#
# Répertoire de déploiement sur le VPS : /opt/playalama/traefik/
# Le réseau traefik-net est créé ici puis utilisé par les stacks prod et staging.
#
# NOTE: docker-api-proxy contourne un problème de compatibilité entre
#       Traefik v3 (hardcode API Docker v1.24) et Docker 29+ (min: v1.40).
#       nginx réécrit /v1.24/ → /v1.47/ avant de forwarder au socket Docker.

services:

  # ─────────────────────────────────────────────────────────
  # Proxy de compatibilité API Docker (Traefik v1.24 → Docker 29 min 1.40)
  # ─────────────────────────────────────────────────────────
  docker-api-proxy:
    image: nginx:1-alpine
    container_name: docker-api-proxy
    restart: unless-stopped
    user: root
    command: ["/bin/sh", "-c", "sed -i 's/user  nginx/user  root/' /etc/nginx/nginx.conf && exec nginx -g 'daemon off;'"]
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./nginx-docker-api-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-internal

  traefik:
    image: traefik:v3.3
    container_name: traefik
    restart: unless-stopped
    depends_on:
      - docker-api-proxy
    ports:
      - "80:80"
      - "443:443"
      - "127.0.0.1:8080:8080"   # Dashboard Traefik — local VPS uniquement
    volumes:
      - ./traefik.yml:/traefik.yml:ro
      - ./acme.json:/acme.json
      - ./logs:/logs
    networks:
      - traefik-net
      - traefik-internal
    labels:
      - "traefik.enable=false"   # Ne pas router Traefik lui-même

networks:
  traefik-net:
    name: traefik-net
    driver: bridge
  traefik-internal:
    internal: true
