# nginx-downloads.conf
# Nginx minimaliste pour servir les fichiers de téléchargement (/downloads/)
# Utilisé par lama-downloads-prod et lama-downloads-staging

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex off;

    location /downloads/ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=3600" always;
        types {
            application/zip zip;
        }
        default_type application/octet-stream;
    }

    location / {
        return 404;
    }
}
