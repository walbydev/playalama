# docker-compose.prod.yml
# Environnement PRODUCTION déployé sur VPS
# Usage: docker compose -f docker-compose.prod.yml up -d
# Note: Présenté de manière à être copié à /opt/playalama/docker-compose.yml
# Ref: DOCKER_ARCHITECTURE.md

version: '3.8'

services:
  lama-webapp:
    build:
      context: .
      dockerfile: tools/docker/Dockerfile.webapp
    container_name: lama-webapp
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5050"
      ASPNETCORE_ENVIRONMENT: "Production"
      LamaApi__BaseUrl: "http://lama-server:5000"
      LAMA_SERVER_URL: "http://lama-server:5000"
    expose:
      - "5050"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5050/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  lama-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lama-server
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5000"
      ASPNETCORE_ENVIRONMENT: "Production"
      LAMA_SERVER_ALLOW_SHUTDOWN: "false"
      LAMA_RUNTIME_MODE: "online"
    expose:
      - "5000"
    volumes:
      - ./assets/languages:/app/assets/languages:ro
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: nginx-playalama
    networks:
      - lama-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./tools/docker/nginx-playalama.conf:/etc/nginx/conf.d/default.conf:ro
      - ./site/static:/usr/share/nginx/html:ro
      - ./artifacts/zip:/opt/playalama-downloads:ro
      - ./.deploy/certs:/etc/letsencrypt:ro
      - ./.deploy/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - lama-webapp
      - lama-server
    restart: unless-stopped

  # Optional: Certbot pour gestion automatique certificats SSL Let's Encrypt
  certbot:
    image: certbot/certbot
    container_name: certbot-playalama
    volumes:
      - ./.deploy/certs:/etc/letsencrypt
      - ./.deploy/certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "certbot certonly --webroot -w /var/www/certbot -d playalama.online -d www.playalama.online -d downloads.playalama.online --non-interactive --agree-tos -m admin@playalama.online || true"
    profiles: ["certbot"]

networks:
  lama-network:
    driver: bridge

