# docker-compose.prod.yml
# Environnement PRODUCTION — playalama.online
#
# Déploiement image-only (aucun build sur le VPS) :
#   make deploy ENV=prod SSH_KEY=~/.ssh/playalama.key
#
# Prérequis VPS :
#   - Réseau Docker "traefik-net" existant (créé par make infra-proxy)
#   - Fichier .env présent dans /opt/playalama/prod/ (voir tools/environments/.env.prod.example)
#   - Images chargées localement via deploy-env.sh (docker load)
#
# Routing Traefik (SSL géré automatiquement) :
#   playalama.online/health    → lama-server-prod   (priorité 25)
#   playalama.online/api/      → lama-server-prod   (priorité 20)
#   playalama.online/downloads → lama-downloads-prod (priorité 20)
#   playalama.online/          → lama-webapp-prod   (catch-all, priorité 10)

services:

  # ─────────────────────────────────────────────────────────
  # Base de données PostgreSQL
  # ─────────────────────────────────────────────────────────
  postgres-lama-prod:
    image: postgres:16-alpine
    container_name: postgres-lama-prod
    networks:
      - prod-internal
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-lama_prod}
      POSTGRES_USER: ${POSTGRES_USER:-lama_prod}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - lama-postgres-prod:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lama_prod} -d ${POSTGRES_DB:-lama_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─────────────────────────────────────────────────────────
  # Service IA — Suggestions de mots (français)
  # ─────────────────────────────────────────────────────────
  lama-aiserver-fr-prod:
    image: lama-aiserver:${DEPLOY_TAG:-latest}
    pull_policy: never
    container_name: lama-aiserver-fr-prod
    networks:
      - prod-internal
    env_file: .env
    environment:
      ASPNETCORE_URLS: "http://+:5203"
      ASPNETCORE_ENVIRONMENT: "Production"
      LAMA_AI_LANGUAGE: "fr"
      LAMA_AI_MAX_CONCURRENT: "3"
      LAMA_LEXICON_CONNECTION_STRING: "Host=postgres-lama-prod;Port=5432;Database=${POSTGRES_DB:-lama_prod};Username=${POSTGRES_USER:-lama_prod};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required};Ssl Mode=Disable;Application Name=LamaAIServer;"
    volumes:
      - ./assets/languages:/app/assets/languages:ro
    restart: unless-stopped
    depends_on:
      postgres-lama-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5203/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────────────────
  # API Jeu + SignalR/SSE
  # ─────────────────────────────────────────────────────────
  lama-server-prod:
    image: lama-server:${DEPLOY_TAG:-latest}
    pull_policy: never
    container_name: lama-server-prod
    networks:
      - prod-internal
      - traefik-net
    env_file: .env
    environment:
      ASPNETCORE_URLS: "http://+:5201"
      ASPNETCORE_ENVIRONMENT: "Production"
      LAMA_SERVER_ALLOW_SHUTDOWN: "false"
      LAMA_RUNTIME_MODE: "online"
      LAMA_AI_SERVER_URL: "http://lama-aiserver-fr-prod:5203"
      ConnectionStrings__LamaServerDb: "Host=postgres-lama-prod;Port=5432;Database=${POSTGRES_DB:-lama_prod};Username=${POSTGRES_USER:-lama_prod};Password=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required};Ssl Mode=Disable;Application Name=LamaServer.Prod;"
      Jwt__Secret: "${JWT_SECRET:?JWT_SECRET is required}"
      Database__AutoMigrate: "true"
      # LAMA_ADMIN_SECRET is read from .env
    expose:
      - "5201"
    volumes:
      - ./assets/languages:/app/assets/languages:ro
      - lama-logs-prod:/app/logs
    restart: unless-stopped
    depends_on:
      postgres-lama-prod:
        condition: service_healthy
      lama-aiserver-fr-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5201/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # /health
      - "traefik.http.routers.server-prod-health.rule=Host(`playalama.online`) && Path(`/health`)"
      - "traefik.http.routers.server-prod-health.entrypoints=websecure"
      - "traefik.http.routers.server-prod-health.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-prod-health.service=server-prod-svc"
      - "traefik.http.routers.server-prod-health.priority=25"
      # /api/
      - "traefik.http.routers.server-prod-api.rule=Host(`playalama.online`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.server-prod-api.entrypoints=websecure"
      - "traefik.http.routers.server-prod-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.server-prod-api.service=server-prod-svc"
      - "traefik.http.routers.server-prod-api.priority=20"
      - "traefik.http.services.server-prod-svc.loadbalancer.server.port=5201"

  # ─────────────────────────────────────────────────────────
  # WebApp unifiée (portail + jeu) — catch-all /
  # ─────────────────────────────────────────────────────────
  lama-webapp-prod:
    image: lama-webapp:${DEPLOY_TAG:-latest}
    pull_policy: never
    container_name: lama-webapp-prod
    networks:
      - prod-internal
      - traefik-net
    env_file: .env
    environment:
      ASPNETCORE_URLS: "http://+:5202"
      ASPNETCORE_ENVIRONMENT: "Production"
      LamaApi__BaseUrl: "http://lama-server-prod:5201"
      LAMA_SERVER_URL: "http://lama-server-prod:5201"
      # LAMA_ADMIN_SECRET is read from .env
    expose:
      - "5202"
    restart: unless-stopped
    depends_on:
      lama-server-prod:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5202/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      - "traefik.enable=true"
      # Catch-all : tout ce qui n'est pas capturé par les routers à priorité plus haute
      - "traefik.http.routers.webapp-prod.rule=Host(`playalama.online`)"
      - "traefik.http.routers.webapp-prod.entrypoints=websecure"
      - "traefik.http.routers.webapp-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.webapp-prod.service=webapp-prod-svc"
      - "traefik.http.routers.webapp-prod.priority=10"
      - "traefik.http.services.webapp-prod-svc.loadbalancer.server.port=5202"

  # ─────────────────────────────────────────────────────────
  # Fichiers statiques de téléchargement (/downloads/)
  # ─────────────────────────────────────────────────────────
  lama-downloads-prod:
    image: nginx:alpine
    container_name: lama-downloads-prod
    networks:
      - traefik-net
    volumes:
      - ./artifacts/zip:/usr/share/nginx/html/downloads:ro
      - ./tools/docker/nginx-downloads.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.downloads-prod.rule=Host(`playalama.online`) && PathPrefix(`/downloads/`)"
      - "traefik.http.routers.downloads-prod.entrypoints=websecure"
      - "traefik.http.routers.downloads-prod.tls.certresolver=letsencrypt"
      - "traefik.http.routers.downloads-prod.service=downloads-prod-svc"
      - "traefik.http.routers.downloads-prod.priority=20"
      - "traefik.http.services.downloads-prod-svc.loadbalancer.server.port=80"

networks:
  prod-internal:
    driver: bridge
    internal: true
  traefik-net:
    external: true

volumes:
  lama-logs-prod:
  lama-postgres-prod:
