services:
  postgres-lama:
    image: postgres:16-alpine
    container_name: postgres-lama-local
    networks:
      - lama-network
    environment:
      POSTGRES_DB: lama_dev
      POSTGRES_USER: lama_dev
      POSTGRES_PASSWORD: dev_password_change_me
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - lama-postgres-data:/var/lib/postgresql/data
      - ./tools/postgres/01-init-sessions-schema.sql:/docker-entrypoint-initdb.d/01-init-sessions-schema.sql:ro
      - ./tools/postgres/02-init-history-schema.sql:/docker-entrypoint-initdb.d/02-init-history-schema.sql:ro
      - ./tools/postgres/03-init-rating-schema.sql:/docker-entrypoint-initdb.d/03-init-rating-schema.sql:ro
      - ./tools/postgres/04-baseline-ef-history.sql:/docker-entrypoint-initdb.d/04-baseline-ef-history.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lama_dev -d lama_dev"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  lama-aiserver-fr:
    build:
      context: .
      dockerfile: Dockerfile.aiserver
    container_name: lama-aiserver-fr
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5203"
      ASPNETCORE_ENVIRONMENT: "Production"
      LAMA_AI_LANGUAGE: "fr"
      LAMA_AI_MAX_CONCURRENT: "3"
      LAMA_LEXICON_CONNECTION_STRING: "Host=postgres-lama;Port=5432;Database=lama_dev;Username=lama_dev;Password=dev_password_change_me;Ssl Mode=Disable;Application Name=LamaAIServer;"
    ports:
      - "5203:5203"
    volumes:
      - ./assets/languages:/app/assets/languages:ro
    restart: unless-stopped
    depends_on:
      postgres-lama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5203/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 15s

  lama-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lama-server
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5201"
      ASPNETCORE_ENVIRONMENT: "Development"
      LAMA_SERVER_ALLOW_SHUTDOWN: "false"
      LAMA_AI_SERVER_URL: "http://lama-aiserver-fr:5203"
      LAMA_ADMIN_SECRET: "dev_admin_secret_change_in_prod"
      ConnectionStrings__LamaServerDb: "Host=postgres-lama;Port=5432;Database=lama_dev;Username=lama_dev;Password=dev_password_change_me;Ssl Mode=Disable;Application Name=LamaServer;"
      Database__AutoMigrate: "true"
    ports:
      - "5201:5201"
    volumes:
      - ./assets/languages:/app/assets/languages:ro
      - ./logs:/app/logs
    depends_on:
      postgres-lama:
        condition: service_healthy
      lama-aiserver-fr:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5201/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s

  lama-webapp:
    build:
      context: .
      dockerfile: Dockerfile.webapp
    container_name: lama-webapp
    networks:
      - lama-network
    environment:
      ASPNETCORE_URLS: "http://+:5202"
      ASPNETCORE_ENVIRONMENT: "Production"
      LamaApi__BaseUrl: "http://lama-server:5201"
      LAMA_SERVER_URL: "http://lama-server:5201"
      LAMA_ADMIN_SECRET: "dev_admin_secret_change_in_prod"
    ports:
      - "5202:5202"
    depends_on:
      lama-server:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5202/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  nginx:
    image: nginx:alpine
    container_name: nginx-playalama
    networks:
      - lama-network
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./tools/docker/nginx-playalama.conf:/etc/nginx/conf.d/default.conf:ro
      - ./artifacts/zip:/opt/playalama-downloads:ro
      - ./.deploy/certs:/etc/letsencrypt:ro
      - ./.deploy/certbot-webroot:/var/www/certbot:ro
    depends_on:
      - lama-webapp
      - lama-server
    restart: unless-stopped

  # Optional: Certbot for SSL certificate management
  certbot:
    image: certbot/certbot
    container_name: certbot-playalama
    volumes:
      - ./.deploy/certs:/etc/letsencrypt
      - ./.deploy/certbot-webroot:/var/www/certbot
    entrypoint: /bin/sh -c "certbot certonly --webroot -w /var/www/certbot -d playalama.online -d www.playalama.online -d downloads.playalama.online --non-interactive --agree-tos -m admin@playalama.online || true"
    profiles: ["certbot"]

networks:
  lama-network:
    driver: bridge

volumes:
  lama-postgres-data:
    driver: local
