
services:
  postgres-lama:
    image: postgres:16-alpine
    container_name: postgres-lama-dev
    environment:
      POSTGRES_DB: lama_dev
      POSTGRES_USER: lama_dev
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_lama_dev_data:/var/lib/postgresql/data
      # Scripts d'initialisation (crées dans l'étape suivante)
      # - ./scripts/postgres/01-init-schemas.sql:/docker-entrypoint-initdb.d/01-init-schemas.sql
      # - ./scripts/postgres/02-init-tables.sql:/docker-entrypoint-initdb.d/02-init-tables.sql
      # - ./scripts/postgres/03-seed-dev.sql:/docker-entrypoint-initdb.d/03-seed-dev.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lama_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - lama-dev
    restart: unless-stopped

  # Optional: PgAdmin for database administration UI
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: pgadmin-lama-dev
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@lama.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
    ports:
      - "5050:80"
    volumes:
      - pgadmin_lama_dev_data:/var/lib/pgadmin
    depends_on:
      postgres-lama:
        condition: service_healthy
    networks:
      - lama-dev
    restart: unless-stopped

volumes:
  postgres_lama_dev_data:
  pgadmin_lama_dev_data:

networks:
  lama-dev:
    driver: bridge

